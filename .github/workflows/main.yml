name: Manual Create Release (cskin)

on:
  workflow_dispatch: # 改为手动触发

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Dynamic Tag Name
        id: tag_gen
        run: |
          # 生成 wanxiangskin-20260324022133 格式
          CUSTOM_TAG="wanxiangskin-$(date +'%Y%m%d%H%M%S')"
          echo "tag_name=$CUSTOM_TAG" >> "$GITHUB_OUTPUT"
          echo "生成的 Tag 名称为: $CUSTOM_TAG"

      - name: Get commits between tags
        id: commits
        run: |
          # 查找上一个正式 Tag
          PREV_TAG=$(git tag --list "wanxiangskin-[0-9]*" --sort=-v:refname | grep -Ev "rc|beta|alpha" | head -n 1)
          
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

          # 因为是手动触发，当前 HEAD 就是我们要发布的内容
          if [ -n "$PREV_TAG" ]; then
            commits=$(git log --pretty=format:'- %s' "$PREV_TAG"..HEAD | sed 's/[^[:print:]]//g')
          else
            commits=$(git log --pretty=format:'- %s' HEAD | sed 's/[^[:print:]]//g')
          fi
          echo "commits<<EOF" >> "$GITHUB_OUTPUT"
          echo "$commits" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Package cskin files
        id: package
        run: |
          set -euo pipefail
          # 使用上面生成的动态 Tag
          CURRENT_TAG="${{ steps.tag_gen.outputs.tag_name }}"
          mkdir -p release
          files=()

          if [ -d "Skin_Keyboard/万象-元书/wanxiang" ]; then
            printf '%s\n' "$CURRENT_TAG" > "Skin_Keyboard/万象-元书/wanxiang/version.txt"
            (cd "Skin_Keyboard/万象-元书" && zip -r "../../release/wanxiang.zip" "wanxiang")
            files+=("release/wanxiang.zip")
          fi

          if [ -d "Skin_Keyboard/万象-元书/WanxiangSkin" ]; then
            printf '%s\n' "$CURRENT_TAG" > "Skin_Keyboard/万象-元书/WanxiangSkin/version.txt"
            (cd "Skin_Keyboard/万象-元书" && zip -r "../../release/WanxiangSkin.zip" "WanxiangSkin")
            mv "release/WanxiangSkin.zip" "release/WanxiangSkin.cskin"
            files+=("release/WanxiangSkin.cskin")
          fi

          if [ -d "Skin_Keyboard/万象-元书/wanxiang-modifier" ]; then
            (cd "Skin_Keyboard/万象-元书" && zip -r "../../release/wanxiang-modifier.zip" "wanxiang-modifier")
            files+=("release/wanxiang-modifier.zip")
          fi

          if [ -d "Skin_Keyboard/万象-元书/WanxiangSkin-modifier" ]; then
            (cd "Skin_Keyboard/万象-元书" && zip -r "../../release/WanxiangSkin-modifier.zip" "WanxiangSkin-modifier")
            files+=("release/WanxiangSkin-modifier.zip")
          fi

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No cskin files produced. Aborting release."
            exit 1
          fi

          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "${files[@]}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          # 使用生成的动态名称作为 Tag 和标题
          tag_name: ${{ steps.tag_gen.outputs.tag_name }}
          name: ${{ steps.tag_gen.outputs.tag_name }}
          body: |
            Changes since ${{ steps.commits.outputs.prev_tag }}:
            ${{ steps.commits.outputs.commits }}
          files: ${{ steps.package.outputs.files }}
          target_commitish: ${{ github.sha }}
